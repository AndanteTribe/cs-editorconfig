name: Distribute EditorConfig
on:
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      owners: ${{ steps.set-owners.outputs.owners }}
    steps:
      - name: Build owner matrix
        id: set-owners
        env:
          APP_OWNER: ${{ vars.APP_OWNER }}
          DEFAULT_OWNER: ${{ github.repository_owner }}
        run: |
          raw="${APP_OWNER:-$DEFAULT_OWNER}"
          # Split on commas, trim whitespace, drop empty entries, encode as JSON array
          json=$(echo "$raw" \
            | tr ',' '\n' \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
            | grep -v '^$' \
            | jq -R . \
            | jq -sc .)
          echo "owners=$json" >> "$GITHUB_OUTPUT"

  distribute:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        owner: ${{ fromJson(needs.setup.outputs.owners) }}
    steps:
      - uses: actions/checkout@v6

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: ${{ matrix.owner }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Distribute EditorConfig to Repositories
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SOURCE_REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: dotnet run .github/scripts/distribute.cs
